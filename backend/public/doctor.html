<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生端管理</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        /* ===== 登录视图 ===== */
        .login-view {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .login-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }
        .login-subtitle {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1.5px solid #e1e5eb;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color .2s;
        }
        .form-input:focus { border-color: #667eea; }
        .btn-login {
            width: 100%;
            height: 46px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            transition: opacity .2s;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .switch-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }
        .switch-link:hover { color: #5568d3; }

        /* ===== 注册视图 ===== */
        .register-view {
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .register-card {
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .register-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        /* ===== 主视图（列表+报告） ===== */
        .main-view { display: none; }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title { font-size: 20px; font-weight: 700; }
        .btn-logout {
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.3); }

        /* 列表视图 */
        .list-view { display: block; padding: 20px; max-width: 800px; margin: 0 auto; }
        .section-title {
            font-size: 17px;
            font-weight: 600;
            color: #333;
            margin-bottom: 14px;
        }
        .patient-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .patient-info { flex: 1; }
        .patient-name { font-size: 15px; font-weight: 600; color: #333; }
        .patient-phone { font-size: 12px; color: #999; margin-top: 2px; }
        .patient-meta { font-size: 12px; color: #bbb; margin-top: 4px; }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            margin-right: 10px;
        }
        .status-pending { background: #fff3e0; color: #e67e22; }
        .status-active { background: #e8f5e9; color: #27ae60; }
        .action-btn {
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-confirm { background: #3498db; color: #fff; }
        .btn-confirm:hover { background: #2980b9; }
        .btn-report { background: #27ae60; color: #fff; }
        .btn-report:hover { background: #219a52; }
        .empty-state {
            text-align: center;
            padding: 48px 0;
            color: #999;
        }
        .empty-icon { font-size: 48px; margin-bottom: 10px; }

        /* 报告视图 */
        .report-view { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .report-patient-name { font-size: 19px; font-weight: 700; color: #333; }
        .btn-back-list {
            background: #f5f5f5;
            color: #666;
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-back-list:hover { background: #eee; }

        /* 指标卡片 */
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .metric-value { font-size: 26px; font-weight: 700; color: #667eea; }
        .metric-label { font-size: 12px; color: #999; margin-top: 4px; }

        /* 图表容器 */
        .chart-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .chart-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 12px; }
        #trendChart { width: 100%; height: 360px; }

        /* 干预建议区域 */
        .note-section {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .note-section-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        .note-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 14px;
            border: 1.5px solid #e1e5eb;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            font-family: inherit;
            transition: border-color .2s;
        }
        .note-textarea:focus { border-color: #667eea; }
        .note-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-save-note {
            padding: 8px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
        }
        .btn-save-note:hover { opacity: 0.9; }
        .btn-save-note:disabled { opacity: 0.5; cursor: not-allowed; }
        .note-hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 8px;
        }
        .toast-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            display: none;
            animation: fadeInOut 2s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; }
        }

        @media (max-width: 700px) {
            .metrics-row { grid-template-columns: repeat(2, 1fr); }
            .patient-card { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<!-- ========== 登录视图 ========== -->
<div class="login-view" id="loginView">
    <div class="login-card">
        <div class="login-title">医生端管理</div>
        <div class="login-subtitle">睡眠评估干预系统 · 医生工作台</div>
        <div class="form-group">
            <label>手机号</label>
            <input type="tel" class="form-input" id="phoneInput" placeholder="请输入医生手机号" maxlength="11">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-input" id="pwdInput" placeholder="请输入密码">
        </div>
        <button class="btn-login" id="btnLogin" onclick="doLogin()">登录</button>
        <div class="error-msg" id="errorMsg"></div>
        <div class="switch-link" onclick="showRegister()">没有账号？去注册</div>
    </div>
</div>

<!-- ========== 注册视图 ========== -->
<div class="register-view" id="registerView">
    <div class="register-card">
        <div class="register-title">医生账号注册</div>
        <div class="form-group">
            <label>姓名</label>
            <input type="text" class="form-input" id="regName" placeholder="请输入姓名" maxlength="20">
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号" maxlength="11">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-input" id="regPwd" placeholder="至少6位密码">
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" class="form-input" id="regPwdConfirm" placeholder="再次输入密码">
        </div>
        <button class="btn-login" id="btnRegister" onclick="doRegister()">注册</button>
        <div class="error-msg" id="regErrorMsg"></div>
        <div class="switch-link" onclick="showLoginFromReg()">已有账号？去登录</div>
    </div>
</div>

<!-- ========== 主视图：患者列表 ========== -->
<div class="main-view" id="mainView">
    <div class="header">
        <span class="header-title">医生端管理</span>
        <button class="btn-logout" onclick="doLogout()">退出登录</button>
    </div>

    <!-- 患者列表 -->
    <div class="list-view" id="listView">
        <div class="section-title">我的患者</div>
        <div id="patientList"></div>
    </div>

    <!-- 报告详情 -->
    <div class="report-view" id="reportView">
        <div class="report-header">
            <span class="report-patient-name" id="reportPatientName"></span>
            <button class="btn-back-list" onclick="showList()">← 返回列表</button>
        </div>
        <div class="metrics-row" id="metricsRow"></div>
        <div class="chart-container">
            <div class="chart-title">睡眠评分趋势</div>
            <div id="trendChart"></div>
        </div>
        <!-- 干预建议区域 -->
        <div class="note-section">
            <div class="note-section-title">干预建议</div>
            <textarea class="note-textarea" id="noteTextarea" placeholder="输入对该患者的睡眠干预建议..."></textarea>
            <div class="note-actions">
                <button class="btn-save-note" id="btnSaveNote" onclick="saveNote()">保存建议</button>
            </div>
            <div class="note-hint">建议将保存到授权记录中，患者可查看</div>
        </div>
    </div>
</div>

<div class="toast-msg" id="toastMsg"></div>

<script>
const API_BASE = '';
let authToken = localStorage.getItem('doctor_token');
let currentPatient = null;
let trendChart = null;

// ========== 视图切换 ==========
function showLogin() {
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('mainView').style.display = 'none';
    document.getElementById('registerView').style.display = 'none';
}
function showRegister() {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('registerView').style.display = 'flex';
}
function showLoginFromReg() {
    // 注册成功后切回登录，自动填充手机号
    const phone = document.getElementById('regPhone').value.trim();
    document.getElementById('phoneInput').value = phone;
    document.getElementById('registerView').style.display = 'none';
    document.getElementById('loginView').style.display = 'flex';
}
function showMain() {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('registerView').style.display = 'none';
    document.getElementById('mainView').style.display = 'block';
}

// ========== API 封装 ==========
async function api(method, url, body) {
    const opts = {
        method,
        headers: { 'Content-Type': 'application/json' },
    };
    if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API_BASE + url, opts);
    return await res.json();
}

// ========== Toast 提示 ============
function showToast(msg) {
    const el = document.getElementById('toastMsg');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.animation = 'none';
    void el.offsetWidth; // 触发重绘
    el.style.animation = 'fadeInOut 2s ease forwards';
    setTimeout(() => { el.style.display = 'none'; }, 2000);
}

// ========== 登录 ==========
async function doLogin() {
    const phone = document.getElementById('phoneInput').value.trim();
    const pwd = document.getElementById('pwdInput').value.trim();

    if (!phone || !pwd) { showError('请填写完整信息'); return; }

    const btn = document.getElementById('btnLogin');
    btn.disabled = true; btn.textContent = '登录中...';

    try {
        const data = await api('POST', '/api/v1/auth/login', { phone, password: pwd });
        if (data.code !== 0) { showError(data.message || '登录失败'); return; }

        if ((data.data.user || data.data).role !== 1) { showError('仅医生账号可登录此页面'); return; }

        authToken = data.data.token;
        localStorage.setItem('doctor_token', authToken);
        hideError();
        showMain();
        loadPatients();
    } catch (e) {
        showError('网络错误，请检查后端服务');
    } finally {
        btn.disabled = false; btn.textContent = '登录';
    }
}

// ========== 注册（仅医生） ==========
async function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const pwd = document.getElementById('regPwd').value.trim();
    const pwdConfirm = document.getElementById('regPwdConfirm').value.trim();

    if (!name || !phone || !pwd) { showRegError('请填写完整信息'); return; }
    if (!/^1\d{10}$/.test(phone)) { showRegError('手机号格式不正确'); return; }
    if (pwd.length < 6) { showRegError('密码至少6位'); return; }
    if (pwd !== pwdConfirm) { showRegError('两次密码不一致'); return; }

    const btn = document.getElementById('btnRegister');
    btn.disabled = true; btn.textContent = '注册中...';

    try {
        const data = await api('POST', '/api/v1/auth/register', {
            phone, password: pwd, nickname: name, role: 1
        });
        if (data.code !== 0) { showRegError(data.message || '注册失败'); return; }

        showToast('注册成功，请登录');
        setTimeout(() => showLoginFromReg(), 1200);
    } catch (e) {
        showRegError('网络错误，请检查后端服务');
    } finally {
        btn.disabled = false; btn.textContent = '注册';
    }
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
}
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
function showRegError(msg) {
    const el = document.getElementById('regErrorMsg');
    el.textContent = msg; el.style.display = 'block';
}
function hideRegError() { document.getElementById('regErrorMsg').style.display = 'none'; }

function doLogout() {
    localStorage.removeItem('doctor_token'); authToken = null;
    showList(); showLogin();
}

// ========== 加载患者列表 ==========
async function loadPatients() {
    const container = document.getElementById('patientList');
    try {
        const data = await api('GET', '/api/doctor/patients');
        if (data.code !== 0) { container.innerHTML = '<p style="color:#e74c3c;text-align:center;padding:30px">' + (data.message || '加载失败') + '</p>'; return; }

        const list = data.data.list || [];
        if (list.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div>暂无授权患者</div></div>';
            return;
        }

        container.innerHTML = list.map(p => `
            <div class="patient-card">
                <div class="patient-info">
                    <div class="patient-name">${p.nickname}</div>
                    <div class="patient-phone">${p.phone}</div>
                    <div class="patient-meta">最新评分: ${p.latest_score !== null ? p.latest_score : '-'} | 授权时间: ${p.requested_at ? p.requested_at.slice(0, 10) : '-'}</div>
                    ${p.doctor_note ? `<div class="patient-meta" style="color:#667eea;margin-top:2px;">已填写建议</div>` : ''}
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <span class="status-badge ${p.status === 'pending' ? 'status-pending' : 'status-active'}">${p.status_text}</span>
                    ${p.status === 'pending'
                        ? `<button class="action-btn btn-confirm" onclick="confirmAuth(${p.auth_id}, '${p.nickname}')">确认授权</button>`
                        : `<button class="action-btn btn-report" onclick="viewReport(${p.patient_id}, '${p.nickname}', ${p.auth_id})">查看报告</button>`
                    }
                </div>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = '<p style="color:#e74c3c;text-align:center;padding:30px">加载失败，请刷新重试</p>';
    }
}

// ========== 确认授权 ==========
async function confirmAuth(authId, name) {
    if (!confirm(`确定要确认对「${name}」的授权吗？`)) return;

    try {
        const data = await api('PUT', '/api/doctor/confirm', { auth_id: authId });
        if (data.code !== 0) { alert(data.message || '操作失败'); return; }
        alert('确认成功！');
        loadPatients();
    } catch (e) {
        alert('网络错误');
    }
}

// ========== 查看报告 ==========
async function viewReport(patientId, name, authId) {
    currentPatient = { id: patientId, name, authId };
    document.getElementById('reportPatientName').textContent = name + ' 的睡眠报告';
    document.getElementById('listView').style.display = 'none';
    document.getElementById('reportView').style.display = 'block';

    try {
        const data = await api('GET', '/api/doctor/patient/data?patient_id=' + patientId);
        if (data.code !== 0) { alert(data.message || '获取报告失败'); showList(); return; }

        renderMetrics(data.data.summary);
        renderChart(data.data.reports);

        // 加载已有干预建议
        try {
            const noteData = await api('GET', '/api/doctor/note?auth_id=' + authId);
            if (noteData.code === 0) {
                document.getElementById('noteTextarea').value = noteData.data.doctor_note || '';
            }
        } catch (e) {
            // 加载建议失败不影响主流程
        }
    } catch (e) {
        alert('加载报告失败');
        showList();
    }
}

function showList() {
    document.getElementById('reportView').style.display = 'none';
    document.getElementById('listView').style.display = 'block';
    currentPatient = null;
}

// ========== 保存干预建议 ===========
async function saveNote() {
    if (!currentPatient || !currentPatient.authId) return;

    const noteText = document.getElementById('noteTextarea').value;
    const btn = document.getElementById('btnSaveNote');

    btn.disabled = true; btn.textContent = '保存中...';

    try {
        const data = await api('PUT', '/api/doctor/note', {
            auth_id: currentPatient.authId,
            note: noteText
        });
        if (data.code !== 0) { alert(data.message || '保存失败'); return; }
        showToast('已保存');
    } catch (e) {
        alert('保存失败，请重试');
    } finally {
        btn.disabled = false; btn.textContent = '保存建议';
    }
}

// ========== 渲染指标卡片 ==========
function renderMetrics(summary) {
    const row = document.getElementById('metricsRow');
    row.innerHTML = `
        <div class="metric-card"><div class="metric-value">${summary.avg_score !== null ? summary.avg_score : '-'}</div><div class="metric-label">平均评分</div></div>
        <div class="metric-card"><div class="metric-value">${summary.latest_score !== null ? summary.latest_score : '-'}</div><div class="metric-label">最新评分</div></div>
        <div class="metric-card"><div class="metric-value">${summary.record_count}</div><div class="metric-label">记录天数</div></div>
        <div class="metric-card"><div class="metric-value" style="color:${summary.avg_score >= 80 ? '#27ae60' : summary.avg_score >= 60 ? '#f39c12' : '#e74c3c'}">${summary.avg_score >= 80 ? '良好' : summary.avg_score >= 60 ? '一般' : '需关注'}</div><div class="metric-label">健康评估</div></div>
    `;
}

// ========== 渲染 ECharts 趋势图 ==========
function renderChart(reports) {
    const dom = document.getElementById('trendChart');
    trendChart = echarts.init(dom);

    const labels = reports.map(r => r.date.slice(5));
    const scores = reports.map(r => r.score);
    const avgScore = scores.length > 0
        ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length)
        : 50;

    const option = {
        tooltip: { trigger: 'axis' },
        grid: { top: 40, right: 25, bottom: 35, left: 45 },
        xAxis: {
            type: 'category',
            data: labels,
            axisLabel: { fontSize: 11, color: '#999' },
            axisLine: { lineStyle: { color: '#ddd' } },
        },
        yAxis: {
            type: 'value',
            min: 40,
            max: 100,
            axisLabel: { fontSize: 11, color: '#999' },
            splitLine: { lineStyle: { color: '#f0f0f0' } },
        },
        series: [{
            type: 'line',
            data: scores,
            smooth: true,
            symbol: 'circle',
            symbolSize: 8,
            lineStyle: { color: '#667eea', width: 2.5 },
            itemStyle: { color: '#667eea' },
            areaStyle: {
                color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                    colorStops: [{ offset: 0, color: 'rgba(102,126,234,0.25)' }, { offset: 1, color: 'rgba(102,126,234,0.02)' }]
                }
            },
            markLine: {
                silent: true,
                lineStyle: { color: '#e74c3c', type: 'dashed', width: 1.5 },
                label: { formatter: `平均 ${avgScore} 分`, position: 'insideEndTop', fontSize: 11, color: '#e74c3c' },
                data: [{ yAxis: avgScore }],
            },
        }],
    };

    trendChart.setOption(option);
    window.addEventListener('resize', () => trendChart && trendChart.resize());
}

// ========== 初始化 ==========
(function init() {
    hideError();
    hideRegError();
    if (authToken) {
        showMain();
        loadPatients();
    } else {
        showLogin();
    }
})();
</script>
</body>
</html>
